<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>輕鬆記帳 2.0</title>
    
    <meta name="description" content="這是一個簡單、實用的網頁記帳程式，打開網頁，便可以開始記帳，且資料皆儲存於裝置上，不用擔心外流。本網頁使用了PWA技術，讓使用者在需要時，可將這個網頁像APP一樣安裝到裝置上。">
    <meta name="keywords" content="記帳, 網頁, PWA, 網頁程式, 漸進式網頁程式, 輕鬆記帳, 網頁記帳, 網頁帳本">
    <meta name="author" content="ADT109119">

    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#F5F5F3">

    <link rel="apple-touch-icon" sizes="192x192" href="icon/icon.png">
    <link rel="shortcut icon" href="icon/favicon.ico">

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval'
            https://cdn.tailwindcss.com
            https://cdnjs.cloudflare.com
            https://cdn.jsdelivr.net
            https://accounts.google.com
            https://apis.google.com
            https://unpkg.com
            https://pagead2.googlesyndication.com
            https://securepubads.g.doubleclick.net;
        style-src 'self' 'unsafe-inline'
            https://cdn.tailwindcss.com
            https://fonts.googleapis.com
            https://cdnjs.cloudflare.com;
        font-src 'self'
            https://fonts.gstatic.com
            https://cdnjs.cloudflare.com;
        connect-src 'self'
            https://www.googleapis.com
            https://oauth2.googleapis.com
            https://jijun-server.the-walking-fish.com
            https://accounts.google.com
            https://fonts.googleapis.com
            https://fonts.gstatic.com
            https://pagead2.googlesyndication.com;
        frame-src
            https://accounts.google.com
            https://docs.google.com;
        img-src 'self' data: https:;
        object-src 'none';
        base-uri 'self';
    ">

    <!-- Tailwind CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha384-t1nt8BQoYMLFN5p42tRAtuAAFQaCQODekUVeKKZrEnEyp4H2R0RHFz0KWpmj7i8g" crossorigin="anonymous">

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js" integrity="sha384-cVMg8E3QFwTvGCDuK+ET4PD341jF3W8nO1auiXfuZNQkzbUUiBGLsIQUE+b1mxws" crossorigin="anonymous"></script>

    <!-- IDB CDN -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js" integrity="sha384-lLGuFiulNF2N/nqC6IxFZzy3WGfLokEKQD73HN9gCx1vFouvtty5kp+wf20Rrs0Y" crossorigin="anonymous"></script>

    <!-- Google Identity Services SDK (for OAuth) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <!-- QRCode.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" integrity="sha384-3zSEDfvllQohrq0PHL1fOXJuC/jSOO34H46t6UQfobFOmxE5BpjjaIJY5F2/bMnU" crossorigin="anonymous"></script>
    <!-- HTML5 QRCode Scanner -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" integrity="sha384-c9d8RFSL+u3exBOJ4Yp3HUJXS4znl9f+z66d1y54ig+ea249SpqR+w1wyvXz/lk+" crossorigin="anonymous" type="text/javascript"></script>

    <link rel="stylesheet" href="src/css/main.css">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "wabi-bg": "rgb(var(--theme-bg, 245 245 243) / <alpha-value>)",
                        "wabi-primary": "rgb(var(--theme-primary, 51 74 82) / <alpha-value>)",
                        "wabi-expense": "rgb(var(--theme-expense, 185 90 90) / <alpha-value>)",
                        "wabi-income": "rgb(var(--theme-income, 106 156 137) / <alpha-value>)",
                        "wabi-accent": "rgb(var(--theme-accent, 226 182 122) / <alpha-value>)",
                        "wabi-text-primary": "rgb(var(--theme-text-primary, 45 55 72) / <alpha-value>)",
                        "wabi-text-secondary": "rgb(var(--theme-text-secondary, 113 128 150) / <alpha-value>)",
                        "wabi-surface": "rgb(var(--theme-surface, 255 255 255) / <alpha-value>)",
                        "wabi-border": "rgb(var(--theme-border, 226 232 240) / <alpha-value>)",
                        "wabi-keypad": "rgb(var(--theme-keypad, 229 231 235) / <alpha-value>)",
                    },
                    fontFamily: {
                        "display": ["Inter", "Noto Sans TC", "sans-serif"]
                    },
                },
            },
        }
    </script>
</head>

<body class="font-display bg-wabi-bg text-wabi-text-primary">
    <div id="app-container" class="relative min-h-screen w-full md:pl-64">
        <!-- Pages will be injected here -->
    </div>

    <!-- Bottom Navigation Bar -->
    <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-wabi-surface/95 backdrop-blur-md border-t border-wabi-border h-20 z-40 flex justify-around items-center md:top-0 md:w-64 md:h-screen md:flex-col md:justify-start md:border-t-0 md:border-r md:pt-8 md:items-stretch md:overflow-y-auto">
        <div class="hidden md:flex items-center justify-center mb-4 px-4">
            <img src="icon/icon.png" alt="輕鬆記帳" class="w-8 h-8 mr-2 rounded-lg shadow-sm">
            <h1 class="text-xl font-bold text-wabi-primary">輕鬆記帳 2.0</h1>
        </div>
        <!-- 帳本切換器（桌面版側邊欄） -->
        <div class="hidden md:block px-4 mb-4">
            <button id="sidebar-ledger-switcher" class="w-full flex items-center gap-2.5 px-3 py-2.5 bg-wabi-primary/5 hover:bg-wabi-primary/10 rounded-xl border border-wabi-border transition-colors group">
                <div id="sidebar-ledger-icon" class="flex items-center justify-center rounded-lg text-white shrink-0 size-8 text-xs" style="background-color: #334A52">
                    <i class="fa-solid fa-book"></i>
                </div>
                <span id="sidebar-ledger-name" class="text-sm font-medium text-wabi-text-primary truncate flex-1 text-left">預設帳本</span>
                <i class="fa-solid fa-chevron-down text-xs text-wabi-text-secondary group-hover:text-wabi-primary transition-colors"></i>
            </button>
        </div>
        <a href="#home" data-page="home" class="nav-item flex flex-col items-center justify-center text-wabi-text-secondary w-full h-full md:flex-row md:justify-start md:items-center md:h-auto md:py-4 md:px-8 hover:bg-black/5">
            <i class="fa-solid fa-house text-xl md:w-6 md:text-center"></i>
            <span class="text-xs mt-1 md:mt-0 md:ml-4 md:text-base font-medium">首頁</span>
        </a>
        <a href="#records" data-page="records" class="nav-item flex flex-col items-center justify-center text-wabi-text-secondary w-full h-full md:flex-row md:justify-start md:items-center md:h-auto md:py-4 md:px-8 hover:bg-black/5">
            <i class="fa-solid fa-list-ul text-xl md:w-6 md:text-center"></i>
            <span class="text-xs mt-1 md:mt-0 md:ml-4 md:text-base font-medium">明細</span>
        </a>
        <a href="#add" data-page="add" class="nav-item flex flex-col items-center justify-center text-wabi-text-secondary w-full h-full md:flex-row md:justify-start md:items-center md:h-auto md:py-3 md:px-8 md:my-2 hover:bg-black/5">
            <div class="flex items-center justify-center w-14 h-14 rounded-full bg-wabi-accent text-wabi-primary shadow-lg -mt-8 md:mt-0 md:w-full md:h-12 md:rounded-xl md:shadow-md">
                <i class="fa-solid fa-plus text-2xl md:text-xl"></i>
                <span class="hidden md:inline ml-2 font-bold text-base">新增紀錄</span>
            </div>
        </a>
        <a href="#stats" data-page="stats" class="nav-item flex flex-col items-center justify-center text-wabi-text-secondary w-full h-full md:flex-row md:justify-start md:items-center md:h-auto md:py-4 md:px-8 hover:bg-black/5">
            <i class="fa-solid fa-chart-pie text-xl md:w-6 md:text-center"></i>
            <span class="text-xs mt-1 md:mt-0 md:ml-4 md:text-base font-medium">統計</span>
        </a>
        <a href="#settings" data-page="settings" class="nav-item flex flex-col items-center justify-center text-wabi-text-secondary w-full h-full md:flex-row md:justify-start md:items-center md:h-auto md:py-4 md:px-8 hover:bg-black/5">
            <i class="fa-solid fa-gear text-xl md:w-6 md:text-center"></i>
            <span class="text-xs mt-1 md:mt-0 md:ml-4 md:text-base font-medium">設定</span>
        </a>
        <div class="hidden md:flex mt-auto pb-4 pt-8 px-8 flex-col text-wabi-text-secondary text-xs opacity-70">
            <span id="sidebar-version-info" class="cursor-default">版本讀取中...</span>
            <div class="mt-1.5 flex flex-wrap gap-x-2 gap-y-1">
                <a href="#privacy" class="hover:underline">隱私權政策</a>
                <span>•</span>
                <a href="#license" class="hover:underline">授權條款</a>
            </div>
            <span class="mt-1.5 cursor-default">&copy; 2025 The walking fish 步行魚</span>
        </div>
    </nav>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-wabi-primary text-white px-6 py-3 rounded-lg shadow-lg opacity-0 transition-all duration-300 z-50">
        <span id="toast-message"></span>
    </div>

    <script type="module" src="src/js/main.js"></script>
</body>
</html>
